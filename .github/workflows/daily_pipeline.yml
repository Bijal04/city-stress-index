name: Daily City Stress Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TOMTOM_API_KEY=${{ secrets.TOMTOM_API_KEY }}" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "OPENAQ_API_KEY=${{ secrets.OPENAQ_API_KEY }}" >> .env

      - name: Create required directories
        run: |
          mkdir -p data/raw/traffic
          mkdir -p data/raw/airquality
          mkdir -p data/raw/weather
          mkdir -p data/raw/cost
          mkdir -p data/raw/safety
          mkdir -p logs

      - name: Verify database exists
        run: |
          if [ -f "data/city_stress.db" ]; then
            echo "Database found. Checking tables..."
            python -c "import sqlite3; conn = sqlite3.connect('data/city_stress.db'); cur = conn.cursor(); cur.execute('SELECT COUNT(*) FROM fact_city_metrics'); print('Existing rows:', cur.fetchone()[0]); conn.close()"
          else
            echo "Database not found. Building from scratch..."
            python src/database.py
            python src/load_dimensions.py
            python src/run_backfill.py
            python src/feature_engineering.py
            python src/scoring_engine.py
            python src/analytics/run_analytics.py
          fi

      - name: Run tests
        run: pytest tests/ -v

      - name: Run data quality checks
        run: python src/data_quality.py

      - name: Run daily collectors
        run: python src/collectors/run_all.py

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Commit updated database and data
        run: |
          git add data/city_stress.db
          git add data/raw/
          git diff --staged --quiet || git commit -m "data: automated daily collection $(date -u '+%Y-%m-%d')"

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7