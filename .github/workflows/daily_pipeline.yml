name: Daily City Stress Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TOMTOM_API_KEY=${{ secrets.TOMTOM_API_KEY }}" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "OPENAQ_API_KEY=${{ secrets.OPENAQ_API_KEY }}" >> .env

      - name: Create required directories
        run: |
          mkdir -p data/raw/traffic
          mkdir -p data/raw/airquality
          mkdir -p data/raw/weather
          mkdir -p data/raw/cost
          mkdir -p data/raw/safety
          mkdir -p logs

      - name: Step 1 - Create database tables
        run: python src/database.py

      - name: Step 2 - Load dimension tables
        run: python src/load_dimensions.py

      - name: Step 3 - Historical backfill
        run: python src/run_backfill.py

      - name: Step 4 - Verify database was created correctly
        run: python -c "import sqlite3; conn = sqlite3.connect('data/city_stress.db'); cur = conn.cursor(); cur.execute('SELECT COUNT(*) FROM fact_city_metrics'); print('fact_city_metrics rows:', cur.fetchone()[0]); conn.close()"

      - name: Step 5 - Run feature engineering
        run: python src/feature_engineering.py

      - name: Step 6 - Run scoring engine
        run: python src/scoring_engine.py

      - name: Step 7 - Run analytics
        run: python src/analytics/run_analytics.py

      - name: Step 8 - Run tests
        run: pytest tests/ -v

      - name: Step 9 - Run data quality checks
        run: python src/data_quality.py

      - name: Step 10 - Run daily collectors
        run: python src/collectors/run_all.py

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7